fail_fast: true
repos:
- repo: local
  hooks:

    - id: pyink
      name: pyink
      entry: poetry run pyink
      language: system
      types: [file, python]
      files: '^smart_control/'

    - id: isort
      name: isort
      entry: poetry run isort
      language: system
      types: [file, python]
      files: '^smart_control/'
      exclude: '^smart_control/proto/'

    # NOTE: running this against all files is prohibitively slow
    # ... so we are choosing to only run against files that have changed
    - id: pylint
      name: pylint
      #entry: pylint --rcfile=.pylintrc --ignore=proto smart_control
      entry: pylint --rcfile=.pylintrc --ignore=proto $(git diff --name-only  --staged | grep -E '\.py$')
      language: system
      types: [file, python]
      files: '^smart_control/'
      exclude: '^smart_control/proto/'
