name: PyLint

on:
  push:
  pull_request:
    branches:
      - master
      - main
      - copybara_push
  # make this workflow manually runnable
  # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_dispatch
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest  # Use an Ubuntu runner for the job

    #strategy:
    #  matrix:
    #    python-version: [3.10.12, 3.10.15, 3.11]  # Python versions to test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Checks out the repository's code

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    #- name: Install system dependencies
    #  run: |
    #    sudo apt update
    #    sudo apt install -y protobuf-compiler ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m venv .venv
        source .venv/bin/activate
        pip install poetry
        poetry install --with dev

    - name: Run style checks
      run: |
        source .venv/bin/activate
        pylint --rcfile=.pylintrc smart_control
